name: Auto Job Scraper Cron

on:
  push:
    branches: [ main ] # Code push karne par check karne ke liye
  schedule:
    - cron: '0 */12 * * *' # Har 12 ghante mein automatic chalega

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4 # Upgraded to v4

    - name: Setup Python
      uses: actions/setup-python@v5 # Upgraded to v5
      with:
        python-version: '3.10'
        cache: 'pip' # Yeh lines libraries ko cache karegi taaki run fast ho

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper Script
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: python scraper.py